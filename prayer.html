<!DOCTYPE html>
<html>
<head>
<title>Prayer Request</title>
<style>
body{font-family:Arial;background:#fff;margin:0}
header{background:#0a3d91;color:white;padding:30px;text-align:center}
section{padding:40px;max-width:700px;margin:auto}
input,textarea{width:100%;padding:10px;margin:10px 0}
button{background:#0a3d91;color:white;padding:12px;border:none}
</style>
</head>

<body>

<header>
<h1>Send a Prayer Request</h1>
</header>

<section>

<p>
Apostle Oluwaseun Israel and the prayer team will stand in faith with you.
</p>

<form>

<input type="text" placeholder="Your Name">

<input type="email" placeholder="Your Email">

<textarea placeholder="Your Prayer Request"></textarea>

<button>Submit Prayer Request</button>

</form>

</section>

</body>
</html>
